version: 2
updates:
  # Keep the GitHub Actions used in our workflows current (e.g. actions/checkout).
  # The Swift dependency (WhisperKit) is declared in the Xcode project, not a
  # Package.swift, so Dependabot's "swift" ecosystem can't see it — bump that
  # one manually in Xcode (File ▸ Packages ▸ Update to Latest Package Versions).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
